<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Gestión de Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

    <div class="flex flex-col md:flex-row w-screen h-screen">
        
        <div class="md:w-1/2 bg-custom-branding relative flex flex-col items-center justify-center p-4 text-white text-center mobile-curve shrink-0">
            <div class="absolute inset-0 bg-black/40"></div>

            <div class="relative z-10 w-full flex flex-col items-center justify-center h-full">
                <div class="flex justify-center items-center space-x-2 md:space-x-6 mb-4 md:mb-12 text-sm md:text-2xl font-black tracking-widest uppercase">
                    <span>Ventas</span>
                    <span class="text-blue-400">✦</span>
                    <span>Inventario</span>
                    <span class="text-blue-400">✦</span>
                    <span>Finanzas</span>
                </div>

                <div class="w-full flex justify-center px-4">
                    <img src="image_1.png" alt="Logo" class="img-logo-main drop-shadow-[0_0_40px_rgba(59,130,246,0.6)]">
                </div>
            </div>
        </div>

        <div class="md:w-1/2 bg-white flex flex-col justify-center px-6 py-4 md:p-24 form-container">
            <div class="max-w-md w-full mx-auto flex flex-col justify-center h-full md:h-auto">
                
                <div class="mb-6 md:mb-8">
                    <h2 class="text-2xl md:text-4xl font-black text-[#1a1a4b] leading-tight tracking-tight uppercase">¡Hola de nuevo!</h2>
                    <p class="text-gray-400 font-bold text-sm md:text-lg">Inicia sesión para continuar</p>
                </div>
                
                <form class="space-y-4 md:space-y-6">
                    <div>
                        <label class="label-custom">Email</label>
                        <input type="email" placeholder="Introduce tu email" required class="input-custom">
                    </div>

                    <div>
                        <label class="label-custom">Password</label>
                        <input type="password" placeholder="Tu contraseña" required class="input-custom">
                    </div>

                    <div class="flex items-center justify-end">
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary">
                        Ingresar
                    </button>
                </form>

                <p class="mt-6 md:mt-10 text-center text-gray-500 text-xs md:text-sm font-bold uppercase">
                    ¿No tienes cuenta? <a href="#" class="text-[#5e72e4] font-black hover:underline">Regístrate</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
