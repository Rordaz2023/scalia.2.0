<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login | Gestión de Negocio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Forzamos que nada se salga de los límites de la pantalla */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Elimina scroll vertical y horizontal */
            background-color: #fff;
        }

        .bg-custom-branding {
            background-image: url('image_4.png');
            background-size: cover;
            background-position: center;
        }

        /* Curva para móvil ajustada para no exceder el viewport */
        @media (max-width: 767px) {
            .mobile-curve {
                clip-path: ellipse(120% 100% at 50% 0%);
                height: 45vh; /* Ocupa casi la mitad exacta */
            }
            .form-container {
                height: 55vh; /* El resto de la pantalla */
            }
        }
    </style>
</head>
<body class="antialiased">

    <div class="flex flex-col md:flex-row w-screen h-screen">
        
        <div class="md:w-1/2 bg-custom-branding relative flex flex-col items-center justify-center p-4 text-white text-center mobile-curve shrink-0">
            <div class="absolute inset-0 bg-black/40"></div>

            <div class="relative z-10 w-full flex flex-col items-center justify-center h-full">
                <div class="flex justify-center items-center space-x-2 md:space-x-6 mb-4 md:mb-12 text-sm md:text-2xl font-black tracking-widest uppercase">
                    <span>Ventas</span>
                    <span class="text-blue-400">✦</span>
                    <span>Inventario</span>
                    <span class="text-blue-400">✦</span>
                    <span>Finanzas</span>
                </div>

                <div class="w-full flex justify-center px-4">
                    <img src="image_1.png" alt="Logo" class="max-h-[25vh] md:max-h-[50vh] w-auto h-auto drop-shadow-[0_0_40px_rgba(59,130,246,0.6)]">
                </div>
            </div>
        </div>

        <div class="md:w-1/2 bg-white flex flex-col justify-center px-6 py-4 md:p-24 form-container">
            <div class="max-w-md w-full mx-auto flex flex-col justify-center h-full md:h-auto">
                
                <div class="mb-6 md:mb-8">
                    <h2 class="text-2xl md:text-4xl font-black text-[#1a1a4b] leading-tight tracking-tight uppercase">¡Hola de nuevo!</h2>
                    <p class="text-gray-400 font-bold text-sm md:text-lg">Inicia sesión para continuar</p>
                </div>
                
                <form class="space-y-4 md:space-y-6">
                    <div>
                        <label class="block text-[#1a1a4b] font-black mb-1 ml-1 uppercase text-[10px] md:text-xs tracking-widest">Email</label>
                        <input type="email" placeholder="Introduce tu email" required
                            class="w-full px-5 py-3 md:py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-base md:text-lg">
                    </div>

                    <div>
                        <label class="block text-[#1a1a4b] font-black mb-1 ml-1 uppercase text-[10px] md:text-xs tracking-widest">Password</label>
                        <input type="password" placeholder="Tu contraseña" required
                            class="w-full px-5 py-3 md:py-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all text-base md:text-lg">
                    </div>

                    <div class="flex items-center justify-end">
                        <a href="#" class="text-[10px] md:text-xs text-gray-400 font-bold hover:text-blue-600 transition-colors uppercase">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" 
                        class="w-full bg-[#5e72e4] hover:bg-[#4859cc] text-white font-black py-4 md:py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-95 text-lg md:text-xl uppercase tracking-widest">
                        Ingresar
                    </button>
                </form>

                <p class="mt-6 md:mt-10 text-center text-gray-500 text-xs md:text-sm font-bold uppercase">
                    ¿No tienes cuenta? <a href="#" class="text-[#5e72e4] font-black hover:underline">Regístrate</a>
                </p>
            </div>
        </div>
    </div>

</body>
</html>
